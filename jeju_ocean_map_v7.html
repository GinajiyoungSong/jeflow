<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>제주 해양지도 플랫폼 - 해볼루션</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 구글 사이트 내부 iframe 및 반응형 샌드박스 완벽 호환 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #d1eae8;
        }

        /* 횡스크롤 지원 상단 필터바 */
        .filter-container {
            flex: 0 0 auto;
            display: flex;
            gap: 8px;
            background: #ffffff;
            padding: 10px 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid #e5e7eb;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            z-index: 1001;
        }
        .filter-container::-webkit-scrollbar {
            display: none;
        }

        /* 개별 탭 버튼 스타일 */
        .filter-bar-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: bold;
            color: #4b5563;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        /* 활성화 테마 스타일 */
        #beach-btn.active { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }
        #port-btn.active { background: #f0fdf4; color: #15803d; border-color: #86efac; }
        #shipPort-btn.active { background: #f8fafc; color: #0f172a; border-color: #cbd5e1; }

        /* 비활성화 스타일 */
        .filter-bar-item.inactive {
            opacity: 0.4;
            background: #f3f4f6;
            color: #9ca3af;
            border-color: #e5e7eb;
        }

        /* 지도 컨테이너 */
        #map-wrapper {
            position: relative;
            flex: 1 1 auto;
            width: 100%;
            height: 100%;
            min-height: 300px;
        }
        #map {
            width: 100%;
            height: 100%;
            background-color: #d1eae8;
        }

        /* 마커 디자인 */
        .custom-marker {
            background: none !important;
            border: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease-in-out;
        }
        .custom-marker:hover {
            transform: scale(1.25) translateY(-3px);
        }
        .parasol-marker {
            font-size: 24px;
            filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.25));
        }

        /* 우측 실시간 정보 대시보드 패널 */
        #ocean-panel {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 330px;
            max-width: calc(100% - 24px);
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #f8fafc;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            padding: 20px;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(15px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .panel-close {
            float: right;
            cursor: pointer;
            font-size: 22px;
            color: #94a3b8;
            line-height: 1;
            transition: color 0.2s;
        }
        .panel-close:hover { color: #f8fafc; }
        
        .panel-title { font-size: 18px; font-weight: bold; color: #38bdf8; margin-bottom: 2px; }
        .panel-subtitle { font-size: 10px; color: #4ade80; font-weight: bold; background: rgba(22, 163, 74, 0.2); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 12px; }
        .panel-desc { font-size: 11px; color: #cbd5e1; line-height: 1.4; margin-bottom: 14px; }

        /* 실시간 기상 구역 */
        .info-card-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 12px;
            margin-bottom: 12px;
        }
        .section-header { font-size: 11px; font-weight: bold; color: #94a3b8; margin-bottom: 8px; }
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .weather-card { background: rgba(255, 255, 255, 0.05); padding: 8px 4px; border-radius: 8px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.05); }
        .weather-label { font-size: 9px; color: #94a3b8; }
        .weather-val { font-size: 12px; font-weight: bold; color: #f8fafc; margin-top: 2px; }

        .marine-evaluation {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            line-height: 1.45;
        }
        .eval-ok { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #34d399; }
        .eval-caution { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: #fbbf24; }
        .eval-danger { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }

        /* 오늘 물때 시간표 */
        .tide-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        .tide-table th { background: rgba(255, 255, 255, 0.1); padding: 6px; color: #f8fafc; font-weight: bold; }
        .tide-table td { padding: 8px 4px; color: #cbd5e1; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .tide-high { color: #fca5a5 !important; font-weight: bold; }
        .tide-low { color: #93c5fd !important; font-weight: bold; }
        
        .tide-tip-box {
            margin-top: 8px;
            background: rgba(30, 78, 216, 0.15);
            color: #93c5fd;
            border: 1px solid rgba(30, 78, 216, 0.3);
            padding: 8px;
            border-radius: 8px;
            font-size: 10px;
            line-height: 1.4;
        }

        /* 지도 위 말풍선 팝업 스타일링 */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            padding: 4px;
            max-width: 290px;
        }
        .leaflet-popup-content {
            font-size: 12px;
            line-height: 1.45;
            margin: 12px 14px;
            color: #1e293b;
        }

        .popup-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px 8px;
            margin-bottom: 6px;
        }
        .popup-title {
            font-size: 14px;
            font-weight: bold;
            color: #1e3a8a;
            margin-right: auto;
        }
        .popup-status-group {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .popup-desc {
            font-size: 11px;
            color: #4b5563;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .popup-info-tag {
            display: inline-block;
            background-color: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .popup-swell-banner {
            background-color: #fee2e2;
            color: #ef4444;
            border: 1px solid #fca5a5;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            margin-top: 8px;
            line-height: 1.35;
        }
        .popup-signal-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 9px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .signal-ok { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .signal-caution { background-color: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .signal-danger { background-color: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

        .popup-guideline {
            margin-top: 4px;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 10.5px;
            line-height: 1.5;
        }
        .popup-guideline b { display: block; margin-bottom: 3px; font-size: 10.5px; }

        /* 모바일 스크린 바텀 시트 최적화 반응형 디자인 */
        @media (max-width: 600px) {
            #ocean-panel {
                top: auto !important;
                right: 0 !important;
                bottom: 0 !important;
                left: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                max-height: 48vh !important;
                overflow-y: auto !important;
                border-radius: 20px 20px 0 0 !important;
                padding: 14px 16px !important;
                box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.25) !important;
                border-left: none !important;
                border-right: none !important;
                border-bottom: none !important;
                border-top: 1px solid rgba(255, 255, 255, 0.15) !important;
                animation: slideUp 0.25s ease-out !important;
            }

            @keyframes slideUp {
                from { transform: translateY(100%); }
                to { transform: translateY(0); }
            }

            .panel-title { font-size: 15px !important; }
            .panel-subtitle { font-size: 9px !important; margin-bottom: 6px !important; }
            .panel-desc { font-size: 10px !important; line-height: 1.35 !important; margin-bottom: 10px !important; }

            .info-card-section { padding-top: 8px !important; margin-bottom: 8px !important; }
            .section-header { font-size: 10px !important; margin-bottom: 5px !important; }
            .weather-grid { gap: 4px !important; }
            .weather-card { padding: 6px 4px !important; }
            .weather-label { font-size: 8px !important; }
            .weather-val { font-size: 11px !important; }

            .marine-evaluation { padding: 8px !important; font-size: 10.5px !important; }

            .tide-table { font-size: 10px !important; }
            .tide-table th { padding: 4px !important; }
            .tide-table td { padding: 5px 2px !important; }
            
            .tide-tip-box { padding: 6px 10px !important; font-size: 9.5px !important; margin-top: 6px !important; line-height: 1.35 !important; }
            .panel-close { font-size: 20px !important; padding: 4px !important; }
        }
    </style>
</head>
<body>

    <div class="filter-container">
        <div class="filter-bar-item active" id="beach-btn">
            <span>⛱️</span>
            <span id="beach-filter-text">해수욕장/해안가 (..)</span>
        </div>
        <div class="filter-bar-item active" id="port-btn">
            <span style="display: inline-flex; align-items: center;">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path d="M 12,2 L 19,13 L 12,13 Z" fill="#2563eb" />
                    <path d="M 11,3 L 6,13 L 11,13 Z" fill="#60a5fa" />
                    <path d="M 3,14 L 21,14 L 18,19 L 6,19 Z" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1" />
                </svg>
            </span>
            <span id="port-filter-text">어촌포구/동네어항 (..)</span>
        </div>
        <div class="filter-bar-item active" id="shipPort-btn">
            <span style="display: inline-flex; align-items: center;">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path d="M4 11h16v3H4zm2-5h12v4H6z" fill="#94a3b8"/>
                    <path d="M2 15l2 4h16l2-4H2z" fill="#0f172a"/>
                </svg>
            </span>
            <span id="shipPort-filter-text">여객선/대형·크루즈항 (..)</span>
        </div>
    </div>

    <div id="map-wrapper">
        <div id="map"></div>

        <div id="ocean-panel">
            <span class="panel-close" onclick="closeOceanPanel()">×</span>
            <div class="panel-title" id="p-name">-</div>
            <div class="panel-subtitle" id="p-category">-</div>
            <div class="panel-desc" id="p-desc">-</div>

            <div class="info-card-section">
                <div class="section-header">☀️ 실시간 바다 기상 및 파랑 정보</div>
                <div class="weather-grid">
                    <div class="weather-card">
                        <div class="weather-label">바람 (풍속)</div>
                        <div class="weather-val" id="w-wind">-.- m/s</div>
                    </div>
                    <div class="weather-card">
                        <div class="weather-label">파도 (파고)</div>
                        <div class="weather-val" id="w-wave">-.- m</div>
                    </div>
                    <div class="weather-card">
                        <div class="weather-label">파주기 (너울)</div>
                        <div class="weather-val" id="w-period">-.- s</div>
                    </div>
                </div>
                <div class="marine-evaluation" id="marine-eval"></div>
            </div>

            <div class="info-card-section" style="border:none; padding:0; margin:0;">
                <div class="section-header">🌊 오늘의 물때 (국립해양조사원 연계)</div>
                <table class="tide-table">
                    <thead>
                        <tr>
                            <th>구분</th>
                            <th>예보시각</th>
                            <th>조위 (cm)</th>
                        </tr>
                    </thead>
                    <tbody id="tide-body"></tbody>
                </table>
                <div class="tide-tip-box" id="tide-tip">
                    👉 마커를 터치하여 정보를 연동하세요.
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-imageoverlay-rotated@0.2.1/Leaflet.ImageOverlay.Rotated.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script>

        window.addEventListener('DOMContentLoaded', () => {
            const map = L.map('map', {
                minZoom: 10,
                maxZoom: 14,
                zoomControl: true,
                maxBoundsViscosity: 1.0 
            }).setView([33.3798, 126.5312], 11);

            const googleSatelliteLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                attribution: '© Google Map Satellite'
            }).addTo(map);

            document.getElementById('map').style.backgroundColor = '#111';
            map.setMaxBounds(null);

            const layers = {
                beach: L.layerGroup().addTo(map),
                port: L.layerGroup().addTo(map),
                ferry: L.layerGroup().addTo(map),
                largePort: L.layerGroup().addTo(map)
            };

            const parasolIcon = L.divIcon({ 
                html: '⛱️', 
                className: 'custom-marker parasol-marker', 
                iconSize: [32, 32], 
                iconAnchor: [16, 16], 
                popupAnchor: [0, -10] 
            });

            const blueSailboatSvg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.35));">
                <path d="M 12,2 L 19,13 L 12,13 Z" fill="#2563eb" />
                <path d="M 11,3 L 6,13 L 11,13 Z" fill="#60a5fa" />
                <line x1="11.5" y1="2" x2="11.5" y2="15" stroke="#1e3a8a" stroke-width="1" />
                <path d="M 3,14 L 21,14 L 18,19 L 6,19 Z" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1" stroke-linejoin="round" />
            </svg>`;
            const portIcon = L.divIcon({ html: blueSailboatSvg, className: 'custom-marker', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -10] });

            // [신규] noport(기능 상실 포구) 전용 - 배 대신 스노클링 마스크 아이콘
            const noPortIcon = L.divIcon({
                html: '🤿',
                className: 'custom-marker parasol-marker',
                iconSize: [32, 32],
                iconAnchor: [16, 16],
                popupAnchor: [0, -10]
            });

            const orangeFerrySvg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.35));">
                <path d="M4 11h16v3H4zm2-5h12v4H6z" fill="#f97316"/>
                <path d="M2 15l2 4h16l2-4H2z" fill="#ea580c"/>
                <rect x="8" y="2" width="2" height="3" fill="#4b5563"/>
                <rect x="14" y="2" width="2" height="3" fill="#4b5563"/>
            </svg>`;
            const ferryIcon = L.divIcon({ html: orangeFerrySvg, className: 'custom-marker', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -10] });

            const cruiseShipSvg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.35));">
                <path d="M3 8h17v5H3V8z" fill="#e2e8f0" />
                <path d="M5 4h12v3H5V4z" fill="#cbd5e1" />
                <rect x="8" y="1" width="3" height="2" fill="#ef4444" />
                <path d="M1 14h22l-2 6H3l-2-6z" fill="#0f172a" />
            </svg>`;
            const largePortIcon = L.divIcon({ html: cruiseShipSvg, className: 'custom-marker', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -10] });

            let beachCount = 0, portCount = 0, ferryCount = 0, largePortCount = 0;
            const googleSheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQp6QfAMngRHE3kSQVduZjx5DitkrGRdejfObMpCaTW2KfBER5aF2g2gIePy1ML5nIBdEOthIPoImaI/pub?output=csv';

            Papa.parse(googleSheetCsvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    data.forEach(item => {
                        const typeVal = (item.category || '').trim().toLowerCase();
                        const nameVal = (item.name || '').trim();
                        const latVal = parseFloat(item.latitude);
                        const lngVal = parseFloat(item.longitude);
                        const infoVal = (item.information || '').trim();
                        const descVal = (item.desc || '').trim();
                        const beachNumVal = (item.beach_num || '').toString().trim(); // [신규] 해수욕장 날씨 API용 해변코드
                        if (!latVal || !lngVal || isNaN(latVal) || isNaN(lngVal) || !nameVal) return;

                        let marker;
                        if (typeVal === 'beach') {
                            marker = L.marker([latVal, lngVal], { icon: parasolIcon }).addTo(layers.beach);
                            beachCount++;
                        }
                        else if (typeVal === 'port') {
                            marker = L.marker([latVal, lngVal], { icon: portIcon }).addTo(layers.port);
                            portCount++;
                        }
                        else if (typeVal === 'noport') {
                            // [신규] 기능 상실 포구 - 어촌포구 필터/카운트에는 함께 묶이지만 아이콘만 스노클링 마스크
                            marker = L.marker([latVal, lngVal], { icon: noPortIcon }).addTo(layers.port);
                            portCount++;
                        }
                        else if (typeVal === 'ferry') {
                            marker = L.marker([latVal, lngVal], { icon: ferryIcon }).addTo(layers.ferry);
                            ferryCount++;
                        }
                        else if (typeVal === 'large') {
                            marker = L.marker([latVal, lngVal], { icon: largePortIcon }).addTo(layers.largePort);
                            largePortCount++;
                        }

                        if (marker) {
                            marker.on('click', () => {
                                handleMarkerClick(marker, nameVal, typeVal, descVal, infoVal, latVal, lngVal, beachNumVal);
                            });
                        }
                    });

                    document.getElementById('beach-filter-text').innerText = `해수욕장/해안가 (${beachCount})`;
                    document.getElementById('port-filter-text').innerText = `어촌포구/동네어항 (${portCount})`;
                    document.getElementById('shipPort-filter-text').innerText = `여객선/대형·크루즈항 (${ferryCount + largePortCount})`;

                    map.invalidateSize();
                }
            });

            const btnMapping = {
                'beach-btn': ['beach'],
                'port-btn': ['port'],
                'shipPort-btn': ['ferry', 'largePort']
            };
            Object.keys(btnMapping).forEach(btnId => {
                const btn = document.getElementById(btnId);
                btn.addEventListener('click', () => {
                    const layerKeys = btnMapping[btnId];
                    if (btn.classList.contains('active')) {
                        btn.classList.remove('active');
                        btn.classList.add('inactive');
                        layerKeys.forEach(key => map.removeLayer(layers[key]));
                    } else {
                        btn.classList.remove('inactive');
                        btn.classList.add('active');
                        layerKeys.forEach(key => map.addLayer(layers[key]));
                    }
                });
            });

            const triggerMapReset = () => { map.invalidateSize(); };
            window.addEventListener('resize', triggerMapReset);
            window.addEventListener('orientationchange', () => {
                setTimeout(triggerMapReset, 300);
            });
            setTimeout(triggerMapReset, 300);
            setTimeout(triggerMapReset, 1000);
        });

        function getStationCode(lat, lng) {
            if (lng > 126.8) {
                return { code: "DT_0022", name: "성산포" }; 
            } else if (lat < 33.34) {
                return { code: "DT_0010", name: "서귀포" }; 
            } else {
                return { code: "DT_0004", name: "제주" };    
            }
        }

        function fetchWithTimeout(url, timeoutMs = 10000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
        }

        // [신규] Apps Script(action=beach)를 거쳐 해수욕장 파고/수온 조회
        // ⚠️ 실제 API 응답의 정확한 필드명이 확인되지 않아, 기상청 표준 응답구조(response.body.items.item)를
        //     기준으로 방어적으로 파싱합니다. 안 맞으면 콘솔에 찍히는 원본 응답을 보고 조정이 필요해요.
        async function fetchBeachWeatherExtras(beachNum) {
            const result = { waveHeight: null, waterTemp: null };
            const appsScriptProxyUrl = "https://script.google.com/macros/s/AKfycbxsFQE8atcqCH7mO8U8jM_sjRHW-Zulsh1JF_Ehpf7jL6q7SCxJPkmZWoHDYfLAIyYB/exec";

            try {
                const [waveRes, tempRes] = await Promise.all([
                    fetchWithTimeout(`${appsScriptProxyUrl}?action=beach&type=wave&beach_num=${beachNum}`),
                    fetchWithTimeout(`${appsScriptProxyUrl}?action=beach&type=temp&beach_num=${beachNum}`)
                ]);

                if (waveRes.ok) {
                    const waveJson = await waveRes.json();
                    console.log('[해수욕장 파고 API 원본 응답]', waveJson);
                    const waveVal = extractBeachApiValue(waveJson, ['wh', 'waveHeight', 'wvhgt', 'value']);
                    if (waveVal !== null) result.waveHeight = parseFloat(parseFloat(waveVal).toFixed(1));
                }
                if (tempRes.ok) {
                    const tempJson = await tempRes.json();
                    console.log('[해수욕장 수온 API 원본 응답]', tempJson);
                    const tempVal = extractBeachApiValue(tempJson, ['tw', 'waterTemp', 'wtemp', 'value']);
                    if (tempVal !== null) result.waterTemp = parseFloat(parseFloat(tempVal).toFixed(1));
                }
            } catch (err) {
                console.error("해수욕장 날씨 API 조회 실패:", err);
            }
            return result;
        }

        // [신규] 기상청 표준 응답구조(response.body.items.item)에서 후보 필드명들을 순서대로 시도해 값 추출
        function extractBeachApiValue(json, candidateKeys) {
            try {
                let items = json?.response?.body?.items?.item || json?.body?.items?.item;
                if (!items) return null;
                if (!Array.isArray(items)) items = [items];
                if (items.length === 0) return null;
                const first = items[0];
                for (const key of candidateKeys) {
                    if (first[key] !== undefined && first[key] !== null && first[key] !== '') {
                        return first[key];
                    }
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        async function handleMarkerClick(marker, name, type, desc, info, lat, lng, beachNum) {
            
            // [신규] 여객선/대형·크루즈항은 법적으로 일반인 입수·스노클링이 금지된 구역
            // [수정] 개정된 법령에 따라 해수욕장(beach)을 제외한 모든 유형(포구/기능상실포구/여객선/대형항)은
            //         물놀이(입수·스노클링·해루질) 금지구역으로 통일
            const isRestrictedZone = (type !== 'beach');
            // [신규] 공식 해수욕장 API 사용 가능 여부 (beach 타입이면서 beach_num이 채워져 있을 때만)
            const useBeachApi = (type === 'beach' && beachNum);

            marker.bindPopup(`<div style="text-align:center; padding: 12px; font-size:12px; color:#4b5563;">⏳ ${isRestrictedZone ? '안내 정보' : '실시간 해양 기상 및 물때'} 로딩 중...</div>`).openPopup();

            let windSpeed = 3.0; 
            let waveHeight = 0.5; 
            let wavePeriod = 5.0; 
            let waterTemp = null; // [신규] 수온 - 해수욕장 API 성공 시에만 값이 채워짐

            // [수정] 입수 금지 구역은 스노클링 판단용 기상 데이터를 애초에 조회하지 않음
            if (!isRestrictedZone) {
            try {
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=wind_speed_10m&wind_speed_unit=ms`;
                const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lng}&current=wave_height,wave_period`;

                const [weatherRes, marineRes] = await Promise.all([
                    fetchWithTimeout(weatherUrl),
                    fetchWithTimeout(marineUrl)
                ]);

                if (weatherRes.ok) {
                    const weatherData = await weatherRes.json();
                    if (weatherData.current && weatherData.current.wind_speed_10m !== undefined) {
                        windSpeed = parseFloat(weatherData.current.wind_speed_10m.toFixed(1));
                    }
                }
                if (marineRes.ok) {
                    const marineData = await marineRes.json();
                    if (marineData.current) {
                        if (marineData.current.wave_height !== undefined) {
                            waveHeight = parseFloat(marineData.current.wave_height.toFixed(1));
                        }
                        if (marineData.current.wave_period !== undefined) {
                            wavePeriod = parseFloat(marineData.current.wave_period.toFixed(1));
                        }
                    }
                }

                // [신규] 공식 해수욕장 API로 파고/수온을 더 정확한 값으로 덮어씀 (조회 실패 시 위 Open-Meteo 값 그대로 사용)
                if (useBeachApi) {
                    const beachData = await fetchBeachWeatherExtras(beachNum);
                    if (beachData.waveHeight !== null) waveHeight = beachData.waveHeight;
                    if (beachData.waterTemp !== null) waterTemp = beachData.waterTemp;
                }
            } catch (error) {
                console.error("실시간 날씨 데이터 수집 실패, 가상 데이터 적용:", error);
                windSpeed = parseFloat((1.0 + Math.random() * 8.5).toFixed(1)); 
                waveHeight = parseFloat((0.1 + Math.random() * 1.8).toFixed(1)); 
                wavePeriod = parseFloat((5.0 + Math.random() * 6.0).toFixed(1)); 
            }
            }

            let signalClass = "signal-ok";
            let signalLabel = "최적 (장판)";
            let signalIcon = "🟢";
            let windStatus = "";
            let waveStatus = "";
            let guidelineText = "";

            if (isRestrictedZone) {
                // [신규] 여객선/대형항 전용 - 법적 입수금지 안내로 대체
                signalClass = "signal-danger";
                signalLabel = "물놀이 금지구역";
                signalIcon = "⚓";
            } else {
                if (windSpeed >= 6.0 || waveHeight >= 1.0 || wavePeriod > 8.0) {
                    signalClass = "signal-danger";
                    signalLabel = "입수 비추천";
                    signalIcon = "🔴";
                } else if (windSpeed > 3.0 || waveHeight > 0.5) {
                    signalClass = "signal-caution";
                    signalLabel = "주의 진입";
                    signalIcon = "🟡";
                }

                windStatus = windSpeed <= 3.0 ? "잔잔한 바람" : (windSpeed <= 5.9 ? "약간의 바람" : "강한 바람");
                waveStatus = waveHeight <= 0.5 ? "장판 바다, 시야 최고" : (waveHeight >= 1.0 ? "높은 파도, 입수 주의" : "일반 파도 수준");

                if (signalClass === "signal-ok") {
                    guidelineText = "오늘은 바람도 잔잔하고 파도도 낮아 스노클링하기 아주 좋은 날이에요. 편하게 즐기세요!";
                } else if (signalClass === "signal-caution") {
                    guidelineText = "약간의 파도 and 바람이 있어요. 초보자는 구명조끼 등 안전장비를 꼭 착용하고 입수하세요.";
                } else {
                    guidelineText = "기상이 불안정하거나 너울 위험이 강합니다. 오늘은 입수를 피하고 안전요원의 안내를 따르세요.";
                }
            }

            let swellBannerHtml = "";
            if (!isRestrictedZone && wavePeriod > 8.0) {
                swellBannerHtml = `
                    <div class="popup-swell-banner">
                        ⚠️ 파도는 낮으나 먼바다 너울 유입 중 - 해안가 갯바위 휩쓸림 주의
                    </div>
                `;
            }

            let popupContent = `
                <div class="popup-header">
                    <span class="popup-title">${name}</span>
                    <span class="popup-status-group">
                        <span class="popup-signal-badge ${signalClass}">${signalIcon} ${signalLabel}</span>
                    </span>
                </div>
                <div class="popup-desc">${desc || "맑고 아름다운 제주 해안가 명소입니다."}</div>
            `;
            if (info) {
                popupContent += `<span class="popup-info-tag">ℹ️ ${info}</span><br>`;
            }
            if (isRestrictedZone) {
                // [신규] 스노클링 가이드 대신 법적 입수금지 안내로 대체
                popupContent += `
                    <div class="popup-guideline ${signalClass}">
                        <b>⚓ 물놀이 금지구역 안내</b>
                        개정된 법령에 따라 포구·어항 및 여객선·대형/크루즈항은 일반인의 입수·스노클링·해루질이 금지된 구역입니다. 물놀이는 지정된 해수욕장을 이용해주세요.
                    </div>
                `;
            } else {
                popupContent += `
                    <div class="popup-guideline ${signalClass}">
                        <b>🤿 스노클링 가이드</b>
                        ${windStatus} · ${waveStatus}<br>
                        ${guidelineText}
                    </div>
                    ${swellBannerHtml}
                `;
            }

            marker.setPopupContent(popupContent);

            const panel = document.getElementById('ocean-panel');
            panel.style.display = 'block';

            document.getElementById('p-name').innerText = name;
            
            let displayCategory = "기타 어항 (물놀이 금지구역)";
            if (type === "beach") displayCategory = "해수욕장 및 해안가";
            else if (type === "port") displayCategory = "어촌포구/어항 (물놀이 금지구역)";
            else if (type === "noport") displayCategory = "기능 상실 포구 (물놀이 금지구역)";
            else if (type === "ferry") displayCategory = "여객/도항선 선착장 (물놀이 금지구역)";
            else if (type === "large") displayCategory = "대형무역/크루즈항 (물놀이 금지구역)";
            
            document.getElementById('p-category').innerText = displayCategory;
            document.getElementById('p-desc').innerText = desc || "맑고 아름다운 제주 해안가 인근 주요 지점입니다.";

            document.getElementById('w-wind').innerText = isRestrictedZone ? '-' : `${windSpeed} m/s`;
            document.getElementById('w-wave').innerText = isRestrictedZone ? '-' : `${waveHeight} m`;
            document.getElementById('w-period').innerText = isRestrictedZone ? '-' : `${wavePeriod} s`;

            const evalBox = document.getElementById('marine-eval');

            if (isRestrictedZone) {
                evalBox.className = `marine-evaluation eval-danger`;
                evalBox.innerHTML = `
                    <div><b>⚓ 안내:</b> 개정된 법령에 따라 포구·어항 및 여객선·대형/크루즈항은 물놀이(입수·스노클링·해루질) 금지구역입니다. 물놀이는 지정된 해수욕장을 이용해주세요.</div>
                `;
            } else {
                let windStatusFull = windSpeed <= 3.0 ? "🍃 잔잔한 바람 (스노클링 최적)" : (windSpeed <= 5.9 ? "💨 약간의 바람 (초보자 주의)" : "⚠️ 강한 바람 (물놀이 비추천 / 서핑 추천)");
                let waveStatusFull = waveHeight <= 0.5 ? "🌊 장판 바다 (스노클링 최적, 시야 최고)" : (waveHeight >= 1.0 ? "⚠️ 높은 파도 (초보 입수 금지)" : "🏄 일반 파도 수준 (안전장비 지참)");
                let generalStatusMent = () => {
                    if (windSpeed >= 6.0 || waveHeight >= 1.0 || wavePeriod > 8.0) return "🚨 기상이 불안정하거나 너울 위험이 강합니다. 해상 안전 요원의 통제에 반드시 협조하세요!";
                    if (windSpeed > 3.0 || waveHeight > 0.5) return "🧐 약간의 파도와 바람이 있습니다. 초보자는 장비를 반드시 착용하고 주의하며 입수하세요.";
                    return "오늘 바다 상태는 매우 평온합니다. 안심하고 안전한 물놀이를 즐기세요!";
                };

                let evalClass = (windSpeed >= 6.0 || waveHeight >= 1.0 || wavePeriod > 8.0) ? "eval-danger" : ((windSpeed > 3.0 || waveHeight > 0.5) ? "eval-caution" : "eval-ok");
                evalBox.className = `marine-evaluation ${evalClass}`;
                evalBox.innerHTML = `
                    <div style="margin-bottom: 5px;"><b>바람:</b> ${windStatusFull}</div>
                    <div style="margin-bottom: 5px;"><b>파도:</b> ${waveStatusFull}</div>
                    ${waterTemp !== null ? `<div style="margin-bottom: 5px;"><b>수온:</b> 🌡️ ${waterTemp}°C</div>` : ''}
                    <div><b>안전진단:</b> ${generalStatusMent()}</div>
                `;
            }

            const station = getStationCode(lat, lng);
            const targetStation = station.name;
            const stationCode = station.code;

            const todayDate = new Date();
            const yearStr = todayDate.getFullYear();
            const monthStr = String(todayDate.getMonth() + 1).padStart(2, '0');
            const dayStr = String(todayDate.getDate()).padStart(2, '0');
            const dateQueryStr = `${yearStr}${monthStr}${dayStr}`;

            const appsScriptProxyUrl = "https://script.google.com/macros/s/AKfycbxsFQE8atcqCH7mO8U8jM_sjRHW-Zulsh1JF_Ehpf7jL6q7SCxJPkmZWoHDYfLAIyYB/exec";
            const tideApiUrl = `${appsScriptProxyUrl}?obsCode=${stationCode}&date=${dateQueryStr}`;

            let tideHtml = "";
            let lowTideTime = "-";

            try {
                const response = await fetchWithTimeout(tideApiUrl, 15000);
                if (response.ok) {
                    const parsedData = await response.json();
                    console.log('[물때 API 원본 응답]', parsedData);

                    // [수정] 새 API는 시간대별 조위값을 연속으로 줌 -> 극대/극소점을 찾아서 고조/저조로 판정
                    // [수정] 실제 응답에 response 래퍼가 없는 것으로 확인됨 - 두 형태 다 시도
                    // [수정] items가 {item: [...]} 형태일 수도, items 자체가 바로 배열일 수도 있어서 둘 다 처리
                    const itemsRaw = parsedData?.body?.items ?? parsedData?.response?.body?.items;
                    console.log('[물때 API - items 원본]', itemsRaw);
                    let items = itemsRaw?.item ?? itemsRaw;
                    if (items && !Array.isArray(items)) items = [items];
                    if (items && items.length > 0) {
                        console.log('[물때 API - 첫 항목 구조]', items[0]);
                    }

                    if (items && items.length > 2) {
                        // 시간/조위값 후보 필드명들을 순서대로 시도
                        const readings = items.map(it => {
                            const timeRaw = it.obsrvnDt || it.reqDate || it.recordTime || it.tm || it.obsTime || it.date_time || '';
                            const levelRaw = it.tdlvHgt ?? it.bscTdlvHgt ?? it.preTdlv ?? it.obsTdlv ?? it.tideLevel ?? it.tide_level ?? it.value;
                            return {
                                time: timeRaw,
                                level: parseFloat(levelRaw)
                            };
                        }).filter(r => !isNaN(r.level));

                        // 시간 형식(YYYYMMDDHHmm 등)에서 시:분만 추출
                        const formatTime = (t) => {
                            const s = String(t).replace(/[^0-9]/g, '');
                            if (s.length >= 12) return s.substring(8, 10) + ':' + s.substring(10, 12);
                            if (s.length >= 4) return s.substring(0, 2) + ':' + s.substring(2, 4);
                            return t;
                        };

                        let lowTideArr = [];
                        readings.forEach((r, i) => {
                            const prev = readings[i - 1];
                            const next = readings[i + 1];
                            let hlLabel = null;
                            if (prev && next) {
                                if (r.level >= prev.level && r.level >= next.level) hlLabel = "고조 (만조)";
                                else if (r.level <= prev.level && r.level <= next.level) hlLabel = "저조 (간조)";
                            }
                            if (!hlLabel) return; // 극대/극소가 아니면 표에 안 넣음 (고조/저조만 표시)

                            const isHigh = hlLabel.startsWith("고조");
                            const levelClass = isHigh ? "tide-high" : "tide-low";
                            const levelStyle = isHigh ? "" : "style='color:#93c5fd; font-weight:bold;'";
                            const timeOnly = formatTime(r.time);

                            if (!isHigh) lowTideArr.push(timeOnly);

                            tideHtml += `
                                <tr>
                                    <td class="${levelClass}">${hlLabel}</td>
                                    <td ${levelStyle}>${timeOnly}</td>
                                    <td>${r.level} cm</td>
                                </tr>
                            `;
                        });

                        lowTideTime = lowTideArr.join(", ") || "-";
                        if (tideHtml) {
                            document.getElementById('tide-body').innerHTML = tideHtml;
                            document.getElementById('tide-tip').innerHTML = `💡 <b>${targetStation}</b> 물때 연동 중: 저조(간조) 시간인 <b>${lowTideTime}</b> 기준 앞뒤 2시간이 맑은 시야 및 스노클링 골든타임입니다.`;
                        }
                    }
                }
            } catch (e) {
                console.error("국립해양조사원 실시간 조석 API 호출 실패, Fallback 데이터 적용:", e);
            }

            if (!tideHtml) {
                const isSouthSide = lat < 33.34;
                const defaultLowTideTime = isSouthSide ? "12:05" : "11:34";
                const defaultHighTideTime = isSouthSide ? "18:12" : "17:45";

                tideHtml = `
                    <tr>
                        <td class="tide-high">고조 (만조)</td>
                        <td>05:25</td>
                        <td>235 cm</td>
                    </tr>
                    <tr>
                        <td class="tide-low">저조 (간조)</td>
                        <td style="color:#93c5fd; font-weight:bold;">${defaultLowTideTime}</td>
                        <td>68 cm</td>
                    </tr>
                    <tr>
                        <td class="tide-high">고조 (만조)</td>
                        <td>${defaultHighTideTime}</td>
                        <td>252 cm</td>
                    </tr>
                `;
                document.getElementById('tide-body').innerHTML = tideHtml;
                document.getElementById('tide-tip').innerHTML = `💡 <b>${targetStation}</b> 물때 연동 중 (Fallback): 저조(간조) 시간인 <b>${defaultLowTideTime}</b> 기준 앞뒤 2시간이 맑은 시야 및 스노클링 골든타임입니다.`;
            }
        }

        window.closeOceanPanel = function() {
            document.getElementById('ocean-panel').style.display = 'none';
        }
    
    </script>
</body>
</html>
