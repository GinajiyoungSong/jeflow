<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>제주 해양지도 플랫폼 - 해볼루션</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #d1eae8;
        }
        .filter-container {
            flex: 0 0 auto;
            display: flex;
            gap: 8px;
            background: #ffffff;
            padding: 10px 12px;
        }
    </style>
</head>
<body>
    <div id="map-wrapper">
        <div id="map"></div>
        <div id="ocean-panel">
            <span class="panel-close" onclick="closeOceanPanel()">×</span>
            <div class="panel-title" id="p-name">-</div>
            <div class="panel-subtitle" id="p-category">-</div>
            <div class="panel-desc" id="p-desc">-</div>
            <div class="info-card-section">
                <div class="weather-grid">
                    <div class="weather-card">
                        <div class="weather-val" id="w-wind">-.- m/s</div>
                    </div>
                    <div class="weather-card">
                        <div class="weather-val" id="w-wave">-.- m</div>
                    </div>
                    <div class="weather-card">
                        <div class="weather-val" id="w-period">-.- s</div>
                    </div>
                </div>
                <div class="marine-evaluation" id="marine-eval"></div>
            </div>
            <table class="tide-table">
                <tbody id="tide-body"></tbody>
            </table>
            <div class="tide-tip-box" id="tide-tip"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-imageoverlay-rotated@0.2.1/Leaflet.ImageOverlay.Rotated.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const map = L.map('map', {
                minZoom: 10,
                maxZoom: 14,
                zoomControl: true,
                maxBoundsViscosity: 1.0 
            }).setView([33.3798, 126.5312], 11);

            const googleSatelliteLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                attribution: '© Google Map Satellite'
            });

            const imageUrl = 'https://github.com/GinajiyoungSong/jeflow/blob/main/jejuisland.jpeg?raw=true';
            const topleft    = L.latLng(33.62, 126.09);       
            const topright   = L.latLng(33.62, 127.04);       
            const bottomleft = L.latLng(33.135, 126.09);   
            const illustOverlay = L.imageOverlay.rotated(imageUrl, topleft, topright, bottomleft, { 
                opacity: 1.0, 
                interactive: false 
            });

            illustOverlay.addTo(map);

            const imageBounds = L.latLngBounds(L.latLng(33.135, 126.09), L.latLng(33.62, 127.04));
            const illustPanBounds = imageBounds.pad(0.15); 
            map.setMaxBounds(illustPanBounds);

            document.getElementById('layer-illust').addEventListener('click', () => {
                document.getElementById('layer-illust').classList.add('active');
                document.getElementById('layer-satellite').classList.remove('active');
                map.removeLayer(googleSatelliteLayer);
                illustOverlay.addTo(map);
                document.getElementById('map').style.backgroundColor = '#d1eae8';
                map.setMaxBounds(illustPanBounds); 
            });

            document.getElementById('layer-satellite').addEventListener('click', () => {
                document.getElementById('layer-satellite').classList.add('active');
                document.getElementById('layer-illust').classList.remove('active');
                map.removeLayer(illustOverlay);
                googleSatelliteLayer.addTo(map);
                document.getElementById('map').style.backgroundColor = '#111';
                map.setMaxBounds(null); 
            });

            const layers = {
                beach: L.layerGroup().addTo(map),
                port: L.layerGroup().addTo(map),
                ferry: L.layerGroup().addTo(map),
                largePort: L.layerGroup().addTo(map)
            };

            const parasolIcon = L.divIcon({ 
                html: '⛱️', 
                className: 'custom-marker parasol-marker', 
                iconSize: [32, 32], 
                iconAnchor: [16, 16], 
                popupAnchor: [0, -10] 
            });

            const blueSailboatSvg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.35));">
                <path d="M 12,2 L 19,13 L 12,13 Z" fill="#2563eb" />
                <path d="M 11,3 L 6,13 L 11,13 Z" fill="#60a5fa" />
                <line x1="11.5" y1="2" x2="11.5" y2="15" stroke="#1e3a8a" stroke-width="1" />
                <path d="M 3,14 L 21,14 L 18,19 L 6,19 Z" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1" stroke-linejoin="round" />
            </svg>`;
            const portIcon = L.divIcon({ html: blueSailboatSvg, className: 'custom-marker', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -10] });

            const orangeFerrySvg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.35));">
                <path d="M4 11h16v3H4zm2-5h12v4H6z" fill="#f97316"/>
                <path d="M2 15l2 4h16l2-4H2z" fill="#ea580c"/>
                <rect x="8" y="2" width="2" height="3" fill="#4b5563"/>
                <rect x="14" y="2" width="2" height="3" fill="#4b5563"/>
            </svg>`;
            const ferryIcon = L.divIcon({ html: orangeFerrySvg, className: 'custom-marker', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -10] });

            const cruiseShipSvg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.35));">
                <path d="M3 8h17v5H3V8z" fill="#e2e8f0" />
                <path d="M5 4h12v3H5V4z" fill="#cbd5e1" />
                <rect x="8" y="1" width="3" height="2" fill="#ef4444" />
                <path d="M1 14h22l-2 6H3l-2-6z" fill="#0f172a" />
            </svg>`;
            const largePortIcon = L.divIcon({ html: cruiseShipSvg, className: 'custom-marker', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -10] });

            let beachCount = 0, portCount = 0, ferryCount = 0, largePortCount = 0;
            const googleSheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQp6QfAMngRHE3kSQVduZjx5DitkrGRdejfObMpCaTW2KfBER5aF2g2gIePy1ML5nIBdEOthIPoImaI/pub?output=csv';

            Papa.parse(googleSheetCsvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    data.forEach(item => {
                        const typeVal = (item.category || '').trim().toLowerCase();
                        const nameVal = (item.name || '').trim();
                        const latVal = parseFloat(item.latitude);
                        const lngVal = parseFloat(item.longitude);
                        const infoVal = (item.information || '').trim();
                        const descVal = (item.desc || '').trim();
                        if (!latVal || !lngVal || isNaN(latVal) || isNaN(lngVal) || !nameVal) return;

                        let marker;
                        if (typeVal === 'beach') {
                            marker = L.marker([latVal, lngVal], { icon: parasolIcon }).addTo(layers.beach);
                            beachCount++;
                        }
                        else if (typeVal === 'port') {
                            marker = L.marker([latVal, lngVal], { icon: portIcon }).addTo(layers.port);
                            portCount++;
                        }
                        else if (typeVal === 'ferry') {
                            marker = L.marker([latVal, lngVal], { icon: ferryIcon }).addTo(layers.ferry);
                            ferryCount++;
                        }
                        else if (typeVal === 'large') {
                            marker = L.marker([latVal, lngVal], { icon: largePortIcon }).addTo(layers.largePort);
                            largePortCount++;
                        }

                        if (marker) {
                            marker.on('click', () => {
                                handleMarkerClick(marker, nameVal, typeVal, descVal, infoVal, latVal, lngVal);
                            });
                        }
                    });

                    document.getElementById('beach-filter-text').innerText = `해수욕장/해안가 (${beachCount})`;
                    document.getElementById('port-filter-text').innerText = `어촌포구/동네어항 (${portCount})`;
                    document.getElementById('ferry-filter-text').innerText = `여객선 선착장 (${ferryCount})`;
                    document.getElementById('largePort-filter-text').innerText = `대형/크루즈항 (${largePortCount})`;

                    map.invalidateSize();
                }
            });

            const btnMapping = {
                'beach-btn': 'beach',
                'port-btn': 'port',
                'ferry-btn': 'ferry',
                'largePort-btn': 'largePort'
            };
            Object.keys(btnMapping).forEach(btnId => {
                const btn = document.getElementById(btnId);
                btn.addEventListener('click', () => {
                    const layerKey = btnMapping[btnId];
                    if (btn.classList.contains('active')) {
                        btn.classList.remove('active');
                        btn.classList.add('inactive');
                        map.removeLayer(layers[layerKey]);
                    } else {
                        btn.classList.remove('inactive');
                        btn.classList.add('active');
                        map.addLayer(layers[layerKey]);
                    }
                });
            });

            const triggerMapReset = () => { map.invalidateSize(); };
            window.addEventListener('resize', triggerMapReset);
            window.addEventListener('orientationchange', () => {
                setTimeout(triggerMapReset, 300);
            });
            setTimeout(triggerMapReset, 300);
            setTimeout(triggerMapReset, 1000);
        });

        function getStationCode(lat, lng) {
            if (lng > 126.8) {
                return { code: "DT_0022", name: "성산포" }; 
            } else if (lat < 33.34) {
                return { code: "DT_0010", name: "서귀포" }; 
            } else {
                return { code: "DT_0004", name: "제주" };    
            }
        }

        function fetchWithTimeout(url, timeoutMs = 6000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
        }

        async function handleMarkerClick(marker, name, type, desc, info, lat, lng) {
            
            // [신규] 여객선/대형·크루즈항은 법적으로 일반인 입수·스노클링이 금지된 구역
            const isRestrictedZone = (type === 'ferry' || type === 'large');

            marker.bindPopup(`<div style="text-align:center; padding: 12px; font-size:12px; color:#4b5563;">⏳ ${isRestrictedZone ? '항구 정보' : '실시간 해양 기상 및 물때'} 로딩 중...</div>`).openPopup();

            let windSpeed = 3.0; 
            let waveHeight = 0.5; 
            let wavePeriod = 5.0; 

            // [수정] 입수 금지 구역은 스노클링 판단용 기상 데이터를 애초에 조회하지 않음
            if (!isRestrictedZone) {
            try {
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=wind_speed_10m&wind_speed_unit=ms`;
                const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lng}&current=wave_height,wave_period`;

                const [weatherRes, marineRes] = await Promise.all([
                    fetchWithTimeout(weatherUrl),
                    fetchWithTimeout(marineUrl)
                ]);

                if (weatherRes.ok) {
                    const weatherData = await weatherRes.json();
                    if (weatherData.current && weatherData.current.wind_speed_10m !== undefined) {
                        windSpeed = parseFloat(weatherData.current.wind_speed_10m.toFixed(1));
                    }
                }
                if (marineRes.ok) {
                    const marineData = await marineRes.json();
                    if (marineData.current) {
                        if (marineData.current.wave_height !== undefined) {
                            waveHeight = parseFloat(marineData.current.wave_height.toFixed(1));
                        }
                        if (marineData.current.wave_period !== undefined) {
                            wavePeriod = parseFloat(marineData.current.wave_period.toFixed(1));
                        }
                    }
                }
            } catch (error) {
                console.error("실시간 날씨 데이터 수집 실패, 가상 데이터 적용:", error);
                windSpeed = parseFloat((1.0 + Math.random() * 8.5).toFixed(1)); 
                waveHeight = parseFloat((0.1 + Math.random() * 1.8).toFixed(1)); 
                wavePeriod = parseFloat((5.0 + Math.random() * 6.0).toFixed(1)); 
            }
            }

            let signalClass = "signal-ok";
            let signalLabel = "최적 (장판)";
            let signalIcon = "🟢";
            let windStatus = "";
            let waveStatus = "";
            let guidelineText = "";

            if (isRestrictedZone) {
                // [신규] 여객선/대형항 전용 - 법적 입수금지 안내로 대체
                signalClass = "signal-danger";
                signalLabel = "입수 금지 구역";
                signalIcon = "⚓";
            } else {
                if (windSpeed >= 6.0 || waveHeight >= 1.0 || wavePeriod > 8.0) {
                    signalClass = "signal-danger";
                    signalLabel = "입수 비추천";
                    signalIcon = "🔴";
                } else if (windSpeed > 3.0 || waveHeight > 0.5) {
                    signalClass = "signal-caution";
                    signalLabel = "주의 진입";
                    signalIcon = "🟡";
                }

                windStatus = windSpeed <= 3.0 ? "잔잔한 바람" : (windSpeed <= 5.9 ? "약간의 바람" : "강한 바람");
                waveStatus = waveHeight <= 0.5 ? "장판 바다, 시야 최고" : (waveHeight >= 1.0 ? "높은 파도, 입수 주의" : "일반 파도 수준");

                if (signalClass === "signal-ok") {
                    guidelineText = "오늘은 바람도 잔잔하고 파도도 낮아 스노클링하기 아주 좋은 날이에요. 편하게 즐기세요!";
                } else if (signalClass === "signal-caution") {
                    guidelineText = "약간의 파도 and 바람이 있어요. 초보자는 구명조끼 등 안전장비를 꼭 착용하고 입수하세요.";
                } else {
                    guidelineText = "기상이 불안정하거나 너울 위험이 강합니다. 오늘은 입수를 피하고 안전요원의 안내를 따르세요.";
                }
            }

            let swellBannerHtml = "";
            if (!isRestrictedZone && wavePeriod > 8.0) {
                swellBannerHtml = `
                    <div class="popup-swell-banner">
                        ⚠️ 파도는 낮으나 먼바다 너울 유입 중 - 해안가 갯바위 휩쓸림 주의
                    </div>
                `;
            }

            let popupContent = `
                <div class="popup-header">
                    <span class="popup-title">${name}</span>
                    <span class="popup-status-group">
                        <span class="popup-traffic-light">
                            <span class="tl-dot tl-red ${signalClass === 'signal-danger' ? 'on' : ''}"></span>
                            <span class="tl-dot tl-yellow ${signalClass === 'signal-caution' ? 'on' : ''}"></span>
                            <span class="tl-dot tl-green ${signalClass === 'signal-ok' ? 'on' : ''}"></span>
                        </span>
                        <span class="popup-signal-badge ${signalClass}">${signalIcon} ${signalLabel}</span>
                    </span>
                </div>
                <div class="popup-desc">${desc || "맑고 아름다운 제주 해안가 명소입니다."}</div>
            `;
            if (info) {
                popupContent += `<span class="popup-info-tag">ℹ️ ${info}</span><br>`;
            }
            if (isRestrictedZone) {
                // [신규] 스노클링 가이드 대신 법적 입수금지 안내로 대체
                popupContent += `
                    <div class="popup-guideline ${signalClass}">
                        <b>⚓ 선박 운항 구역 안내</b>
                        이 구역은 선박이 상시 운항하는 항구로, 관련 법령에 따라 일반인의 입수·스노클링·해루질이 금지되어 있습니다. 안전을 위해 지정된 해수욕장/포구를 이용해주세요.
                    </div>
                `;
            } else {
                popupContent += `
                    <div class="popup-guideline ${signalClass}">
                        <b>🤿 스노클링 가이드</b>
                        ${windStatus} · ${waveStatus}<br>
                        ${guidelineText}
                    </div>
                    ${swellBannerHtml}
                `;
            }

            marker.setPopupContent(popupContent);

            const panel = document.getElementById('ocean-panel');
            panel.style.display = 'block';

            document.getElementById('p-name').innerText = name;
            
            let displayCategory = "기타 어항";
            if (type === "beach") displayCategory = "해수욕장 및 해안가";
            else if (type === "port") displayCategory = "어촌포구/어항";
            else if (type === "ferry") displayCategory = "여객/도항선 선착장";
            else if (type === "large") displayCategory = "대형무역/크루즈항";
            
            document.getElementById('p-category').innerText = displayCategory;
            document.getElementById('p-desc').innerText = desc || "맑고 아름다운 제주 해안가 인근 주요 지점입니다.";

            document.getElementById('w-wind').innerText = isRestrictedZone ? '-' : `${windSpeed} m/s`;
            document.getElementById('w-wave').innerText = isRestrictedZone ? '-' : `${waveHeight} m`;
            document.getElementById('w-period').innerText = isRestrictedZone ? '-' : `${wavePeriod} s`;

            const evalBox = document.getElementById('marine-eval');

            if (isRestrictedZone) {
                evalBox.className = `marine-evaluation eval-danger`;
                evalBox.innerHTML = `
                    <div><b>⚓ 안내:</b> 이 구역은 선박 운항 구역으로, 법령상 일반인의 입수·스노클링·해루질이 금지되어 있습니다. 스노클링을 원하시면 지도에서 해수욕장/포구 마커를 이용해주세요.</div>
                `;
            } else {
                let windStatusFull = windSpeed <= 3.0 ? "🍃 잔잔한 바람 (스노클링 최적)" : (windSpeed <= 5.9 ? "💨 약간의 바람 (초보자 주의)" : "⚠️ 강한 바람 (물놀이 비추천 / 서핑 추천)");
                let waveStatusFull = waveHeight <= 0.5 ? "🌊 장판 바다 (스노클링 최적, 시야 최고)" : (waveHeight >= 1.0 ? "⚠️ 높은 파도 (초보 입수 금지)" : "🏄 일반 파도 수준 (안전장비 지참)");
                let generalStatusMent = () => {
                    if (windSpeed >= 6.0 || waveHeight >= 1.0 || wavePeriod > 8.0) return "🚨 기상이 불안정하거나 너울 위험이 강합니다. 해상 안전 요원의 통제에 반드시 협조하세요!";
                    if (windSpeed > 3.0 || waveHeight > 0.5) return "🧐 약간의 파도와 바람이 있습니다. 초보자는 장비를 반드시 착용하고 주의하며 입수하세요.";
                    return "오늘 바다 상태는 매우 평온합니다. 안심하고 안전한 물놀이를 즐기세요!";
                };

                let evalClass = (windSpeed >= 6.0 || waveHeight >= 1.0 || wavePeriod > 8.0) ? "eval-danger" : ((windSpeed > 3.0 || waveHeight > 0.5) ? "eval-caution" : "eval-ok");
                evalBox.className = `marine-evaluation ${evalClass}`;
                evalBox.innerHTML = `
                    <div style="margin-bottom: 5px;"><b>바람:</b> ${windStatusFull}</div>
                    <div style="margin-bottom: 5px;"><b>파도:</b> ${waveStatusFull}</div>
                    <div><b>안전진단:</b> ${generalStatusMent()}</div>
                `;
            }

            const station = getStationCode(lat, lng);
            const targetStation = station.name;
            const stationCode = station.code;

            const todayDate = new Date();
            const yearStr = todayDate.getFullYear();
            const monthStr = String(todayDate.getMonth() + 1).padStart(2, '0');
            const dayStr = String(todayDate.getDate()).padStart(2, '0');
            const dateQueryStr = `${yearStr}${monthStr}${dayStr}`;

            const appsScriptProxyUrl = "https://script.google.com/macros/s/AKfycbxsFQE8atcqCH7mO8U8jM_sjRHW-Zulsh1JF_Ehpf7jL6q7SCxJPkmZWoHDYfLAIyYB/exec";
            const tideApiUrl = `${appsScriptProxyUrl}?obsCode=${stationCode}&date=${dateQueryStr}`;

            let tideHtml = "";
            let lowTideTime = "-";

            try {
                const response = await fetchWithTimeout(tideApiUrl);
                if (response.ok) {
                    const parsedData = await response.json(); 
                    
                    if (parsedData.result && parsedData.result.data) {
                        const tideList = parsedData.result.data;
                        let lowTideArr = [];

                        tideList.forEach(item => {
                            const timeOnly = item.tide_time ? item.tide_time.split(" ")[1].substring(0, 5) : "-";
                            const isHigh = item.hl_code === "고조" || item.hl_code === "H";
                            const isLow = item.hl_code === "저조" || item.hl_code === "L";
                            const levelClass = isHigh ? "tide-high" : "tide-low";
                            const levelStyle = isHigh ? "" : "style='color:#93c5fd; font-weight:bold;'";

                            if (isLow) {
                                lowTideArr.push(timeOnly);
                            }

                            tideHtml += `
                                <tr>
                                    <td class="${levelClass}">${item.hl_code}</td>
                                    <td ${levelStyle}>${timeOnly}</td>
                                    <td>${item.tide_level} cm</td>
                                </tr>
                            `;
                        });

                        lowTideTime = lowTideArr.join(", ");
                        document.getElementById('tide-body').innerHTML = tideHtml;
                        document.getElementById('tide-tip').innerHTML = `💡 <b>${targetStation}</b> 물때 연동 중: 저조(간조) 시간인 <b>${lowTideTime}</b> 기준 앞뒤 2시간이 맑은 시야 및 스노클링 골든타임입니다.`;
                    }
                }
            } catch (e) {
                console.error("국립해양조사원 실시간 조석 API 호출 실패, Fallback 데이터 적용:", e);
            }

            if (!tideHtml) {
                const isSouthSide = lat < 33.34;
                const defaultLowTideTime = isSouthSide ? "12:05" : "11:34";
                const defaultHighTideTime = isSouthSide ? "18:12" : "17:45";

                tideHtml = `
                    <tr>
                        <td class="tide-high">고조 (만조)</td>
                        <td>05:25</td>
                        <td>235 cm</td>
                    </tr>
                    <tr>
                        <td class="tide-low">저조 (간조)</td>
                        <td style="color:#93c5fd; font-weight:bold;">${defaultLowTideTime}</td>
                        <td>68 cm</td>
                    </tr>
                    <tr>
                        <td class="tide-high">고조 (만조)</td>
                        <td>${defaultHighTideTime}</td>
                        <td>252 cm</td>
                    </tr>
                `;
                document.getElementById('tide-body').innerHTML = tideHtml;
                document.getElementById('tide-tip').innerHTML = `💡 <b>${targetStation}</b> 물때 연동 중 (Fallback): 저조(간조) 시간인 <b>${defaultLowTideTime}</b> 기준 앞뒤 2시간이 맑은 시야 및 스노클링 골든타임입니다.`;
            }
        }

        window.closeOceanPanel = function() {
            document.getElementById('ocean-panel').style.display = 'none';
        }
    </script>
</body>
</html>
