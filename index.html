<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>제주 해양지도 플랫폼 - 해볼루션</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 구글 사이트 내부 iframe 및 반응형 샌드박스 완벽 호환 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #d1eae8;
        }

        /* 횡스크롤 지원 상단 필터바 */
        .filter-container {
            flex: 0 0 auto;
            display: flex;
            gap: 8px;
            background: #ffffff;
            padding: 10px 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid #e5e7eb;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            z-index: 1001;
        }
        .filter-container::-webkit-scrollbar {
            display: none;
        }

        /* 개별 탭 버튼 스타일 */
        .filter-bar-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: bold;
            color: #4b5563;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        /* 활성화 테마 스타일 */
        #beach-btn.active { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }
        #port-btn.active { background: #f0fdf4; color: #15803d; border-color: #86efac; }
        #ferry-btn.active { background: #fff7ed; color: #c2410c; border-color: #ffedd5; }
        #largePort-btn.active { background: #f8fafc; color: #0f172a; border-color: #cbd5e1; }

        /* 비활성화 스타일 */
        .filter-bar-item.inactive {
            opacity: 0.4;
            background: #f3f4f6;
            color: #9ca3af;
            border-color: #e5e7eb;
        }

        /* 지도 스타일 변경 배너 */
        .layer-banner {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 8px 12px;
            border-bottom: 1px solid #e5e7eb;
            z-index: 1001;
        }
        .layer-btn {
            font-size: 12px;
            font-weight: bold;
            padding: 7px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: #4b5563;
            background: #ffffff;
            border: 1px solid #e2e8f0;
        }
        .layer-btn.active {
            background: #1e3a8a;
            color: #ffffff;
            border-color: #1e3a8a;
        }

        /* 지도 컨테이너 */
        #map-wrapper {
            position: relative;
            flex: 1 1 auto;
            width: 100%;
            height: 100%;
            min-height: 300px;
        }
        #map {
            width: 100%;
            height: 100%;
            background-color: #d1eae8;
        }

        /* 마커 디자인 */
        .custom-marker {
            background: none !important;
            border: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease-in-out;
        }
        .custom-marker:hover {
            transform: scale(1.25) translateY(-3px);
        }
        .parasol-marker {
            font-size: 24px;
            filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.25));
        }

        /* 우측 실시간 정보 대시보드 패널 */
        #ocean-panel {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 330px;
            max-width: calc(100% - 24px);
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #f8fafc;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            padding: 20px;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(15px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .panel-close {
            float: right;
            cursor: pointer;
            font-size: 22px;
            color: #94a3b8;
            line-height: 1;
            transition: color 0.2s;
        }
        .panel-close:hover { color: #f8fafc; }
        
        .panel-title { font-size: 18px; font-weight: bold; color: #38bdf8; margin-bottom: 2px; }
        .panel-subtitle { font-size: 10px; color: #4ade80; font-weight: bold; background: rgba(22, 163, 74, 0.2); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 12px; }
        .panel-desc { font-size: 11px; color: #cbd5e1; line-height: 1.4; margin-bottom: 14px; }

        /* 실시간 기상 구역 */
        .info-card-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 12px;
            margin-bottom: 12px;
        }
        .section-header { font-size: 11px; font-weight: bold; color: #94a3b8; margin-bottom: 8px; }
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .weather-card { background: rgba(255, 255, 255, 0.05); padding: 8px 4px; border-radius: 8px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.05); }
        .weather-label { font-size: 9px; color: #94a3b8; }
        .weather-val { font-size: 12px; font-weight: bold; color: #f8fafc; margin-top: 2px; }

        .marine-evaluation {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            line-height: 1.45;
        }
        .eval-ok { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #34d399; }
        .eval-caution { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: #fbbf24; }
        .eval-danger { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }

        /* 오늘 물때 시간표 */
        .tide-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        .tide-table th { background: rgba(255, 255, 255, 0.1); padding: 6px; color: #f8fafc; font-weight: bold; }
        .tide-table td { padding: 8px 4px; color: #cbd5e1; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .tide-high { color: #fca5a5 !important; font-weight: bold; }
        .tide-low { color: #93c5fd !important; font-weight: bold; }
        
        .tide-tip-box {
            margin-top: 8px;
            background: rgba(30, 78, 216, 0.15);
            color: #93c5fd;
            border: 1px solid rgba(30, 78, 216, 0.3);
            padding: 8px;
            border-radius: 8px;
            font-size: 10px;
            line-height: 1.4;
        }

        /* 지도 위 말풍선 팝업 스타일링 */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            padding: 4px;
            max-width: 290px;
        }
        .leaflet-popup-content {
            font-size: 12px;
            line-height: 1.45;
            margin: 12px 14px;
            color: #1e293b;
        }

        .popup-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px 8px;
            margin-bottom: 6px;
        }
        .popup-title {
            font-size: 14px;
            font-weight: bold;
            color: #1e3a8a;
            margin-right: auto;
        }
        .popup-status-group {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .popup-traffic-light {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: #1f2937;
            padding: 4px 5px;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .popup-traffic-light .tl-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #4b5563;
            opacity: 0.4;
            transition: all 0.2s;
        }
        .popup-traffic-light .tl-dot.tl-red.on {
            background: #ef4444;
            opacity: 1;
            box-shadow: 0 0 6px 1px rgba(239, 68, 68, 0.85);
        }
        .popup-traffic-light .tl-dot.tl-yellow.on {
            background: #facc15;
            opacity: 1;
            box-shadow: 0 0 6px 1px rgba(250, 204, 21, 0.85);
        }
        .popup-traffic-light .tl-dot.tl-green.on {
            background: #22c55e;
            opacity: 1;
            box-shadow: 0 0 6px 1px rgba(34, 197, 94, 0.85);
        }
        .popup-desc {
            font-size: 11px;
            color: #4b5563;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .popup-info-tag {
            display: inline-block;
            background-color: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .popup-swell-banner {
            background-color: #fee2e2;
            color: #ef4444;
            border: 1px solid #fca5a5;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            margin-top: 8px;
            line-height: 1.35;
        }
        .popup-signal-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 9px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .signal-ok { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3
