<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주 해양지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }
        .filter-container {
            flex: 0 0 auto;
            display: flex;
            gap: 8px;
            background: #ffffff;
            padding: 10px 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid #e5e7eb;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .filter-container::-webkit-scrollbar { display: none; }
        .filter-bar-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: bold;
            color: #4b5563;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }
        #beach-btn.active { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }
        #port-btn.active { background: #f0fdf4; color: #15803d; border-color: #86efac; }
        #ferry-btn.active { background: #fff7ed; color: #c2410c; border-color: #ffedd5; }
        #largePort-btn.active { background: #f8fafc; color: #0f172a; border-color: #cbd5e1; }
        .filter-bar-item.inactive {
            opacity: 0.4;
            background: #f3f4f6;
            color: #9ca3af;
            border-color: #e5e7eb;
        }
        #map {
            flex: 1 1 auto;
            width: 100%;
            height: 100%;
            min-height: 450px;
            background-color: #d1eae8;
        }
        .custom-marker {
            background: none !important;
            border: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease-in-out;
        }
        .custom-marker:hover { transform: scale(1.25) translateY(-3px); }
        .parasol-marker {
            font-size: 24px;
            filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.25));
        }
        .leaflet-popup-content {
            font-size: 12px;
            line-height: 1.5;
        }
        .popup-info-tag {
            display: inline-block;
            background-color: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-top: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="filter-container">
        <div class="filter-bar-item active" id="beach-btn">
            <span>⛱️</span>
            <span id="beach-filter-text">해수욕장/해안가 (..)</span>
        </div>
        <div class="filter-bar-item active" id="port-btn">
            <span style="display: inline-flex; align-items: center;">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path d="M 12,2 L 19,13 L 12,13 Z" fill="#2563eb" />
                    <path d="M 11,3 L 6,13 L 11,13 Z" fill="#60a5fa" />
                    <path d="M 3,14 L 21,14 L 18,19 L 6,19 Z" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1" />
                </svg>
            </span>
            <span id="port-filter-text">어촌포구/동네어항 (..)</span>
        </div>
        <div class="filter-bar-item active" id="ferry-btn">
            <span style="display: inline-flex; align-items: center;">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path d="M4 11h16v3H4zm2-5h12v4H6z" fill="#f97316"/>
                    <path d="M2 15l2 4h16l2-4H2z" fill="#ea580c"/>
                </svg>
            </span>
            <span id="ferry-filter-text">여객선 선착장 (..)</span>
        </div>
        <div class="filter-bar-item active" id="largePort-btn">
            <span style="display: inline-flex; align-items: center;">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path d="M3 8h17v5H3V8z" fill="#94a3b8" />
                    <path d="M1 14h22l-2 6H3l-2-6z" fill="#0f172a" />
                </svg>
            </span>
            <span id="largePort-filter-text">대형/크루즈항 (..)</span>
        </div>
    </div>
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-imageoverlay-rotated@0.2.1/Leaflet.ImageOverlay.Rotated.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const map = L.map('map', {
                minZoom: 10,
                maxZoom: 14,
                zoomControl: true
            }).setView([33.3798, 126.5312], 11);
            
            const imageUrl = 'https://github.com/GinajiyoungSong/jeflow/blob/main/jejuisland.jpeg?raw=true';
            const topleft    = L.latLng(33.62, 126.09);    
            const topright   = L.latLng(33.62, 127.04);    
            const bottomleft = L.latLng(33.135, 126.09);   
            L.imageOverlay.rotated(imageUrl, topleft, topright, bottomleft, { opacity: 1.0, interactive: false }).addTo(map);
            
            const imageBounds = L.latLngBounds(L.latLng(33.135, 126.09), L.latLng(33.62, 127.04));
            map.setMaxBounds(imageBounds);
            
            const layers = {
                beach: L.layerGroup().addTo(map),
                port: L.layerGroup().addTo(map),
                ferry: L.layerGroup().addTo(map),
                largePort: L.layerGroup().addTo(map)
            };
            
            const parasolIcon = L.divIcon({ html: '⛱️', className: 'custom-marker parasol-marker', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -10] });
            const blueSailboatSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.35));"><path d="M 12,2 L 19,13 L 12,13 Z" fill="#2563eb" /><path d="M 11,3 L 6,13 L 11,13 Z" fill="#60a5fa" /><line x1="11.5" y1="2" x2="11.5" y2="15" stroke="#1e3a8a" stroke-width="1" /><path d="M 3,14 L 21,14 L 18,19 L 6,19 Z" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1" stroke-linejoin="round" /></svg>`;
            const portIcon = L.divIcon({ html: blueSailboatSvg, className: 'custom-marker', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -10] });
            const orangeFerrySvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.35));"><path d="M4 11h16v3H4zm2-5h12v4H6z" fill="#f97316"/><path d="M2 15l2 4h16l2-4H2z" fill="#ea580c"/><rect x="8" y="2" width="2" height="3" fill="#4b5563"/><rect x="14" y="2" width="2" height="3" fill="#4b5563"/></svg>`;
            const ferryIcon = L.divIcon({ html: orangeFerrySvg, className: 'custom-marker', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -10] });
            const cruiseShipSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" style="filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.35));"><path d="M3 8h17v5H3V8z" fill="#e2e8f0" /><path d="M5 4h12v3H5V4z" fill="#cbd5e1" /><rect x="8" y="1" width="3" height="2" fill="#ef4444" /><path d="M1 14h22l-2 6H3l-2-6z" fill="#0f172a" /></svg>`;
            const largePortIcon = L.divIcon({ html: cruiseShipSvg, className: 'custom-marker', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -10] });
            
            let beachCount = 0, portCount = 0, ferryCount = 0, largePortCount = 0;
            const googleSheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQp6QfAMngRHE3kSQVduZjx5DitkrGRdejfObMpCaTW2KfBER5aF2g2gIePy1ML5nIBdEOthIPoImaI/pub?output=csv';
            
            Papa.parse(googleSheetCsvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    data.forEach(item => {
                        const typeVal = (item.category || '').trim().toLowerCase();
                        const nameVal = (item.name || '').trim();
                        const latVal = parseFloat(item.Latitude);
                        const lngVal = parseFloat(item.Longitude);
                        const infoVal = (item.information || '').trim();
                        const descVal = (item.desc || '').trim();
                        
                        if (!latVal || !lngVal || isNaN(latVal) || isNaN(lngVal) || !nameVal) return;
                        
                        let popupContent = `<b>${nameVal}</b>`;
                        if (descVal) popupContent += `<br>${descVal}`;
                        if (infoVal) popupContent += `<br><span class="popup-info-tag">ℹ️ ${infoVal}</span>`;
                        
                        if (typeVal === 'beach') {
                            L.marker([latVal, lngVal], { icon: parasolIcon }).bindPopup(popupContent).addTo(layers.beach);
                            beachCount++;
                        }
                        else if (typeVal === 'port') {
                            L.marker([latVal, lngVal], { icon: portIcon }).bindPopup(popupContent).addTo(layers.port);
                            portCount++;
                        }
                        else if (typeVal === 'ferry') {
                            L.marker([latVal, lngVal], { icon: ferryIcon }).bindPopup(popupContent).addTo(layers.ferry);
                            ferryCount++;
                        }
                        else if (typeVal === 'large') {
                            L.marker([latVal, lngVal], { icon: largePortIcon }).bindPopup(popupContent).addTo(layers.largePort);
                            largePortCount++;
                        }
                    });
                    
                    document.getElementById('beach-filter-text').innerText = `해수욕장/해안가 (${beachCount})`;
                    document.getElementById('port-filter-text').innerText = `어촌포구/동네어항 (${portCount})`;
                    document.getElementById('ferry-filter-text').innerText = `여객선 선착장 (${ferryCount})`;
                    document.getElementById('largePort-filter-text').innerText = `대형/크루즈항 (${largePortCount})`;
                }
            });
            
            const btnMapping = {
                'beach-btn': 'beach',
                'port-btn': 'port',
                'ferry-btn': 'ferry',
                'largePort-btn': 'largePort'
            };
            
            Object.keys(btnMapping).forEach(btnId => {
                const btn = document.getElementById(btnId);
                btn.addEventListener('click', () => {
                    const layerKey = btnMapping[btnId];
                    if (btn.classList.contains('active')) {
                        btn.classList.remove('active');
                        btn.classList.add('inactive');
                        map.removeLayer(layers[layerKey]);
                    } else {
                        btn.classList.remove('inactive');
                        btn.classList.add('active');
                        map.addLayer(layers[layerKey]);
                    }
                });
            });
        });
    </script>
</body>
</html>
