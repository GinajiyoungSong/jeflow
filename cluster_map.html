<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>업체 분포 지도 | 해볼루션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --navy:#0B2438;
    --navy-deep:#071726;
    --jade:#2FA8A0;
    --jade-light:#7ED1C8;
    --jade-dark:#0F6E56;
    --coral:#E2543F;
    --coral-dark:#993C1D;
    --amber:#EF9F27;
    --amber-dark:#854F0B;
    --sand:#F7F4EC;
    --sand-dim:#D9CFB0;
    --ink:#1C1F22;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; overflow:hidden; }
  body{
    background:var(--navy-deep);
    color:var(--sand);
    font-family:'Noto Sans KR', sans-serif;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  .display{ font-family:'Black Han Sans', sans-serif; }

  .navbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 5vw;
    border-bottom:1px solid rgba(247,244,236,0.12);
    background:var(--navy-deep);
    position:relative; z-index:1200;
  }
  .back-link{
    display:flex; align-items:center; gap:8px;
    color:var(--sand-dim); text-decoration:none;
    font-size:13px; font-weight:500;
    border:1px solid rgba(217,207,176,0.3);
    padding:7px 13px; border-radius:999px;
  }
  .brand-mark{ display:flex; align-items:center; gap:9px; }
  .brand-mark .logo-dot{ width:9px; height:9px; border-radius:50%; background:var(--coral); }
  .brand-mark span{ font-size:13px; letter-spacing:2px; color:var(--sand-dim); }
  .page-index{ font-size:12px; color:var(--sand-dim); }
  .page-index b{ color:var(--jade-light); }

  .map-shell{
    position:relative;
    height:calc(100% - 53px);
  }
  #map{ position:absolute; inset:0; background:#e9e4d8; }

  .legend{
    position:absolute; top:16px; left:16px; z-index:900;
    background:rgba(7,23,38,0.92); border:1px solid rgba(247,244,236,0.15);
    border-radius:10px; padding:14px 16px; color:var(--sand);
    font-size:12px; max-width:190px;
    backdrop-filter:blur(4px);
  }
  .legend h4{ font-size:12px; font-weight:700; margin-bottom:10px; color:var(--sand-dim); letter-spacing:0.5px; }
  .legend-row{ display:flex; align-items:center; gap:9px; margin-bottom:7px; }
  .legend-row:last-child{ margin-bottom:0; }
  .legend-dot{ border-radius:50%; flex-shrink:0; }
  .legend-row .l1{ width:22px; height:22px; background:var(--coral); }
  .legend-row .l2{ width:16px; height:16px; background:var(--amber); }
  .legend-row .l3{ width:10px; height:10px; background:var(--jade); }
  .legend-total{
    margin-top:12px; padding-top:12px; border-top:1px solid rgba(247,244,236,0.15);
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--sand-dim);
  }
  .legend-total b{ color:var(--jade-light); font-size:15px; }

  .cluster-icon{ display:flex; align-items:center; justify-content:center; }
  .cluster-circle{
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    border:2px solid rgba(255,255,255,0.55);
    font-family:'JetBrains Mono', monospace; font-weight:700; color:var(--navy-deep);
    cursor:pointer; transition:transform .12s ease;
  }
  .cluster-circle:hover{ transform:scale(1.08); }
  .tier-large{ background:var(--coral); }
  .tier-medium{ background:var(--amber); }
  .tier-small{ background:var(--jade); }
  .cluster-label{
    position:absolute; bottom:-18px; left:50%; transform:translateX(-50%);
    font-size:10px; white-space:nowrap; color:var(--navy-deep);
    background:rgba(247,244,236,0.92); padding:1px 6px; border-radius:4px;
    font-weight:700; pointer-events:none; opacity:0; transition:opacity .12s ease;
  }
  .cluster-icon:hover .cluster-label{ opacity:1; }

  /* ===== BOTTOM SHEET ===== */
  .backdrop{
    position:fixed; inset:0; background:rgba(7,23,38,0.55);
    z-index:1000; opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .backdrop.show{ opacity:1; pointer-events:auto; }

  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:1100;
    background:var(--sand); color:var(--ink);
    border-radius:18px 18px 0 0;
    max-height:72vh;
    transform:translateY(100%);
    transition:transform .28s cubic-bezier(.32,.72,0,1);
    display:flex; flex-direction:column;
    box-shadow:0 -18px 40px rgba(0,0,0,0.35);
  }
  .sheet.open{ transform:translateY(0); }
  .sheet-handle{
    width:40px; height:4px; background:rgba(28,31,34,0.25); border-radius:99px;
    margin:10px auto 4px; cursor:grab;
  }
  .sheet-header{
    padding:10px 22px 14px; border-bottom:1px dashed rgba(28,31,34,0.18);
    display:flex; align-items:center; justify-content:space-between;
  }
  .sheet-header h2{ font-family:'Black Han Sans', sans-serif; font-size:22px; }
  .sheet-header .sub{ font-size:12.5px; color:#5F5E5A; margin-top:2px; }
  .sheet-close{
    width:32px; height:32px; border-radius:50%; border:1px solid rgba(28,31,34,0.2);
    background:transparent; font-size:16px; cursor:pointer; color:#5F5E5A;
    flex-shrink:0;
  }
  .sheet-list{ overflow-y:auto; padding:14px 22px 26px; flex:1; }
  .biz-item{
    display:flex; align-items:center; gap:12px;
    padding:12px 0; border-bottom:1px solid rgba(28,31,34,0.08);
  }
  .biz-item:last-child{ border-bottom:none; }
  .biz-badge-count{
    width:38px; height:38px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:rgba(47,168,160,0.12); border:1.5px dashed var(--jade-dark);
    font-family:'JetBrains Mono', monospace; font-size:10px; font-weight:700; color:var(--jade-dark);
  }
  .biz-badge-count.zero{ background:rgba(28,31,34,0.05); border-color:rgba(28,31,34,0.25); color:#8A8880; }
  .biz-info{ flex:1; min-width:0; }
  .biz-info .name{ font-size:15px; font-weight:700; }
  .biz-info .meta{ font-size:12px; color:#5F5E5A; margin-top:2px; }
  .biz-type-tag{
    font-size:10.5px; font-weight:700; color:var(--jade-dark);
    background:rgba(47,168,160,0.14); padding:2px 8px; border-radius:4px; margin-right:6px;
  }
  .biz-more{
    text-align:center; padding:16px 0 4px; font-size:13px; color:var(--jade-dark);
    font-weight:700; text-decoration:none; display:block;
  }
</style>
</head>
<body>

<nav class="navbar">
  <a class="back-link" href="jeflow.html">← 제주 바다 지도로</a>
  <div class="brand-mark"><span class="logo-dot"></span><span class="mono">HAEVOLUTION</span></div>
  <div class="page-index">업체 분포 지도</div>
</nav>

<div class="map-shell">
  <div id="map"></div>
  <div class="legend">
    <h4>행정동별 등록 업체</h4>
    <div class="legend-row"><span class="legend-dot l1"></span>30개 이상</div>
    <div class="legend-row"><span class="legend-dot l2"></span>10 ~ 29개</div>
    <div class="legend-row"><span class="legend-dot l3"></span>10개 미만</div>
    <div class="legend-total">전체 등록 <b id="legend-total">-</b>개 · <span id="legend-dong-count">-</span>개 행정동</div>
  </div>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle" id="sheet-handle"></div>
  <div class="sheet-header">
    <div>
      <h2 id="sheet-title">-</h2>
      <div class="sub" id="sheet-sub">-</div>
    </div>
    <button class="sheet-close" id="sheet-close" aria-label="닫기">✕</button>
  </div>
  <div class="sheet-list" id="sheet-list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/*
  실서비스 연동 시: DONG_DATA의 count는 제주도 공공데이터(사업자 주소 지번/도로명)를
  행정동 단위로 집계한 값으로 교체하세요. businesses 배열도 강사·업체 시트의
  실데이터(Google Sheets 공개 CSV)로 대체 가능합니다. 현재는 2라운드 대면평가용 예시입니다.
*/
const DONG_DATA = [
  { name:"제주시 원도심", lat:33.5141, lng:126.5230, count:41,
    businesses:[
      {name:"탑동 다이브센터", type:"스쿠버다이빙샵", badges:["biz","ins","edu","aed"]},
      {name:"제주항 스노클투어", type:"스노클링샵", badges:["biz"]},
      {name:"이도프리다이빙", type:"프리다이빙샵", badges:["biz","edu"]},
      {name:"산지천 다이브샵", type:"스쿠버다이빙샵", badges:[]}
    ]},
  { name:"애월읍", lat:33.4623, lng:126.3315, count:45,
    businesses:[
      {name:"애월 스노클클럽", type:"스노클링샵", badges:["biz","edu"]},
      {name:"곽지 프리다이버스", type:"프리다이빙샵", badges:["biz","ins","edu","aed"]},
      {name:"한담 씨워킹", type:"스노클링샵", badges:[]},
      {name:"애월블루 스쿠버", type:"스쿠버다이빙샵", badges:["biz","ins"]}
    ]},
  { name:"한림읍", lat:33.4111, lng:126.2696, count:22,
    businesses:[
      {name:"한림 프리다이버스", type:"프리다이빙샵", badges:["biz","ins","edu","aed"]},
      {name:"협재 스노클베이스", type:"스노클링샵", badges:["biz"]},
      {name:"금능 씨스포츠", type:"스쿠버다이빙샵", badges:[]}
    ]},
  { name:"한경면", lat:33.3477, lng:126.1706, count:12,
    businesses:[
      {name:"수월봉 다이브포인트", type:"스쿠버다이빙샵", badges:["biz","ins"]},
      {name:"고산 스노클링투어", type:"스노클링샵", badges:[]}
    ]},
  { name:"대정읍", lat:33.2231, lng:126.2508, count:18,
    businesses:[
      {name:"모슬포 다이브베이스", type:"스쿠버다이빙샵", badges:["biz","ins"]},
      {name:"가파도 스노클투어", type:"스노클링샵", badges:["biz"]},
      {name:"송악산 프리다이빙", type:"프리다이빙샵", badges:[]}
    ]},
  { name:"안덕면", lat:33.2541, lng:126.3330, count:15,
    businesses:[
      {name:"화순 씨스쿠버", type:"스쿠버다이빙샵", badges:["biz","edu"]},
      {name:"사계 스노클클럽", type:"스노클링샵", badges:[]}
    ]},
  { name:"서귀포 동지역", lat:33.2536, lng:126.5602, count:38,
    businesses:[
      {name:"서귀포 딥블루", type:"스쿠버다이빙샵", badges:["biz","ins","edu","aed"]},
      {name:"중문 씨스노클", type:"스노클링샵", badges:["biz","ins"]},
      {name:"법환 프리다이빙", type:"프리다이빙샵", badges:["biz"]},
      {name:"색달 다이브포인트", type:"스쿠버다이빙샵", badges:[]}
    ]},
  { name:"남원읍", lat:33.2790, lng:126.7160, count:20,
    businesses:[
      {name:"위미 스쿠버베이스", type:"스쿠버다이빙샵", badges:["biz","ins"]},
      {name:"신례 스노클투어", type:"스노클링샵", badges:[]}
    ]},
  { name:"표선면", lat:33.3271, lng:126.8330, count:14,
    businesses:[
      {name:"표선 씨워킹샵", type:"스노클링샵", badges:["biz","edu"]},
      {name:"토산 프리다이버스", type:"프리다이빙샵", badges:[]}
    ]},
  { name:"성산읍", lat:33.4585, lng:126.9260, count:33,
    businesses:[
      {name:"성산블루 스쿠버", type:"스쿠버다이빙샵", badges:["biz","ins","edu"]},
      {name:"우도 가는길 스노클", type:"스노클링샵", badges:["biz"]},
      {name:"신양 프리다이빙", type:"프리다이빙샵", badges:["biz","ins","edu","aed"]},
      {name:"광치기 다이브투어", type:"스쿠버다이빙샵", badges:[]}
    ]},
  { name:"구좌읍", lat:33.5220, lng:126.8450, count:19,
    businesses:[
      {name:"세화 씨스쿠버", type:"스쿠버다이빙샵", badges:["biz"]},
      {name:"하도 스노클클럽", type:"스노클링샵", badges:["biz","edu"]}
    ]},
  { name:"조천읍", lat:33.5410, lng:126.6400, count:24,
    businesses:[
      {name:"함덕 프리브릿지", type:"프리다이빙샵", badges:["biz","edu"]},
      {name:"조천 씨워킹투어", type:"스노클링샵", badges:[]},
      {name:"신촌 다이브포인트", type:"스쿠버다이빙샵", badges:["biz","ins"]}
    ]},
  { name:"우도면", lat:33.5050, lng:126.9510, count:3,
    businesses:[
      {name:"우도 씨스노클", type:"스노클링샵", badges:["biz","ins"]}
    ]}
];

const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([33.38, 126.55], 10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom:18
}).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

const maxCount = Math.max(...DONG_DATA.map(d => d.count));
const totalCount = DONG_DATA.reduce((s,d) => s + d.count, 0);
document.getElementById('legend-total').textContent = totalCount;
document.getElementById('legend-dong-count').textContent = DONG_DATA.length;

function tierOf(count){
  if (count >= 30) return 'large';
  if (count >= 10) return 'medium';
  return 'small';
}

DONG_DATA.forEach(d => {
  const size = Math.round(18 + Math.sqrt(d.count) * 4.6);
  const opacity = (0.42 + (d.count / maxCount) * 0.43).toFixed(2);
  const tier = tierOf(d.count);
  const icon = L.divIcon({
    className:'cluster-icon',
    html:`<div class="cluster-circle tier-${tier}" style="width:${size}px;height:${size}px;opacity:${opacity};font-size:${Math.max(11, size*0.34)}px;">${d.count}<div class="cluster-label">${d.name}</div></div>`,
    iconSize:[size, size],
    iconAnchor:[size/2, size/2]
  });
  const marker = L.marker([d.lat, d.lng], { icon }).addTo(map);
  marker.on('click', () => openSheet(d));
});

const BADGE_META = {
  biz:{ label:"사업자" }, ins:{ label:"보험" }, edu:{ label:"안전교육" }, aed:{ label:"AED" }
};

const sheet = document.getElementById('sheet');
const backdrop = document.getElementById('backdrop');

function openSheet(dong){
  document.getElementById('sheet-title').textContent = dong.name;
  document.getElementById('sheet-sub').textContent = `등록 업체 ${dong.count}개 · 인증 표시가 없는 곳은 아직 미확인 업체입니다`;

  const list = document.getElementById('sheet-list');
  const shown = dong.businesses;
  const remain = dong.count - shown.length;

  list.innerHTML = shown.map(b => {
    const n = b.badges.length;
    const badgeCls = n === 0 ? 'zero' : '';
    const badgeTxt = n === 0 ? '인증전' : `${n}/4`;
    return `
    <div class="biz-item">
      <div class="biz-badge-count ${badgeCls}">${badgeTxt}</div>
      <div class="biz-info">
        <div class="name">${b.name}</div>
        <div class="meta"><span class="biz-type-tag">${b.type}</span>${n ? b.badges.map(k=>BADGE_META[k].label).join(' · ') : '인증 정보 없음'}</div>
      </div>
    </div>`;
  }).join('');

  if (remain > 0){
    list.innerHTML += `<a class="biz-more" href="partners.html?q=${encodeURIComponent(dong.name)}">${dong.name} 업체 ${remain}개 더보기 →</a>`;
  }

  sheet.classList.add('open');
  backdrop.classList.add('show');
}

function closeSheet(){
  sheet.classList.remove('open');
  backdrop.classList.remove('show');
}

document.getElementById('sheet-close').addEventListener('click', closeSheet);
backdrop.addEventListener('click', closeSheet);

let dragStartY = null;
const handle = document.getElementById('sheet-handle');
handle.addEventListener('pointerdown', e => { dragStartY = e.clientY; sheet.style.transition = 'none'; });
window.addEventListener('pointermove', e => {
  if (dragStartY === null) return;
  const dy = Math.max(0, e.clientY - dragStartY);
  sheet.style.transform = `translateY(${dy}px)`;
});
window.addEventListener('pointerup', e => {
  if (dragStartY === null) return;
  const dy = e.clientY - dragStartY;
  sheet.style.transition = '';
  sheet.style.transform = '';
  if (dy > 90) closeSheet();
  dragStartY = null;
});
</script>
</body>
</html>
