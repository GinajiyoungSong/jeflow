<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>업체 분포 지도 | 해볼루션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --navy:#0B2438;
    --navy-deep:#071726;
    --jade:#2FA8A0;
    --jade-light:#7ED1C8;
    --jade-dark:#0F6E56;
    --coral:#E2543F;
    --coral-dark:#993C1D;
    --amber:#EF9F27;
    --amber-dark:#854F0B;
    --sand:#F7F4EC;
    --sand-dim:#D9CFB0;
    --ink:#1C1F22;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; overflow:hidden; }
  body{
    background:var(--navy-deep);
    color:var(--sand);
    font-family:'Noto Sans KR', sans-serif;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  .display{ font-family:'Black Han Sans', sans-serif; }

  .navbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 5vw;
    border-bottom:1px solid rgba(247,244,236,0.12);
    background:var(--navy-deep);
    position:relative; z-index:1200;
  }
  .back-link{
    display:flex; align-items:center; gap:8px;
    color:var(--sand-dim); text-decoration:none;
    font-size:13px; font-weight:500;
    border:1px solid rgba(217,207,176,0.3);
    padding:7px 13px; border-radius:999px;
  }
  .brand-mark{ display:flex; align-items:center; gap:9px; }
  .brand-mark .logo-dot{ width:9px; height:9px; border-radius:50%; background:var(--coral); }
  .brand-mark span{ font-size:13px; letter-spacing:2px; color:var(--sand-dim); }
  .page-index{ font-size:12px; color:var(--sand-dim); }
  .page-index b{ color:var(--jade-light); }

  .map-shell{
    position:relative;
    height:calc(100% - 53px);
  }
  #map{ position:absolute; inset:0; background:#e9e4d8; }

  .legend{
    position:absolute; top:16px; left:16px; z-index:900;
    background:rgba(7,23,38,0.92); border:1px solid rgba(247,244,236,0.15);
    border-radius:10px; padding:14px 16px; color:var(--sand);
    font-size:12px; max-width:190px;
    backdrop-filter:blur(4px);
  }
  .legend h4{ font-size:12px; font-weight:700; margin-bottom:10px; color:var(--sand-dim); letter-spacing:0.5px; }
  .legend-row{ display:flex; align-items:center; gap:9px; margin-bottom:7px; }
  .legend-row:last-child{ margin-bottom:0; }
  .legend-dot{ border-radius:50%; flex-shrink:0; }
  .legend-row .l1{ width:22px; height:22px; background:var(--coral); }
  .legend-row .l2{ width:16px; height:16px; background:var(--amber); }
  .legend-row .l3{ width:10px; height:10px; background:var(--jade); }
  .legend-total{
    margin-top:12px; padding-top:12px; border-top:1px solid rgba(247,244,236,0.15);
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--sand-dim);
  }
  .legend-total b{ color:var(--jade-light); font-size:15px; }

  .cluster-icon{ display:flex; align-items:center; justify-content:center; }
  .cluster-circle{
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    border:2px solid rgba(255,255,255,0.55);
    font-family:'JetBrains Mono', monospace; font-weight:700; color:var(--navy-deep);
    cursor:pointer; transition:transform .12s ease;
  }
  .cluster-circle:hover{ transform:scale(1.08); }
  .tier-large{ background:var(--coral); }
  .tier-medium{ background:var(--amber); }
  .tier-small{ background:var(--jade); }
  .cluster-label{
    position:absolute; bottom:-18px; left:50%; transform:translateX(-50%);
    font-size:10px; white-space:nowrap; color:var(--navy-deep);
    background:rgba(247,244,236,0.92); padding:1px 6px; border-radius:4px;
    font-weight:700; pointer-events:none; opacity:0; transition:opacity .12s ease;
  }
  .cluster-icon:hover .cluster-label{ opacity:1; }

  /* ===== BOTTOM SHEET ===== */
  .backdrop{
    position:fixed; inset:0; background:rgba(7,23,38,0.55);
    z-index:1000; opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .backdrop.show{ opacity:1; pointer-events:auto; }

  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:1100;
    background:var(--sand); color:var(--ink);
    border-radius:18px 18px 0 0;
    max-height:72vh;
    transform:translateY(100%);
    transition:transform .28s cubic-bezier(.32,.72,0,1);
    display:flex; flex-direction:column;
    box-shadow:0 -18px 40px rgba(0,0,0,0.35);
  }
  .sheet.open{ transform:translateY(0); }
  .sheet-handle{
    width:40px; height:4px; background:rgba(28,31,34,0.25); border-radius:99px;
    margin:10px auto 4px; cursor:grab;
  }
  .sheet-header{
    padding:10px 22px 14px; border-bottom:1px dashed rgba(28,31,34,0.18);
    display:flex; align-items:center; justify-content:space-between;
  }
  .sheet-header h2{ font-family:'Black Han Sans', sans-serif; font-size:22px; }
  .sheet-header .sub{ font-size:12.5px; color:#5F5E5A; margin-top:2px; }
  .sheet-close{
    width:32px; height:32px; border-radius:50%; border:1px solid rgba(28,31,34,0.2);
    background:transparent; font-size:16px; cursor:pointer; color:#5F5E5A;
    flex-shrink:0;
  }
  .sheet-list{ overflow-y:auto; padding:14px 22px 26px; flex:1; }
  .biz-item{
    display:flex; align-items:flex-start; gap:12px;
    padding:12px 0; border-bottom:1px solid rgba(28,31,34,0.08);
  }
  .biz-item:last-child{ border-bottom:none; }
  .status-chip{
    flex-shrink:0; margin-top:2px;
    font-family:'JetBrains Mono', monospace; font-size:10px; font-weight:700;
    padding:5px 9px; border-radius:6px; white-space:nowrap;
  }
  .status-chip.active{ background:rgba(47,168,160,0.14); color:var(--jade-dark); border:1px solid rgba(47,168,160,0.4); }
  .status-chip.closed{ background:rgba(226,84,63,0.12); color:var(--coral-dark); border:1px solid rgba(226,84,63,0.4); }
  .status-chip.unknown{ background:rgba(28,31,34,0.06); color:#8A8880; border:1px solid rgba(28,31,34,0.2); }
  .biz-info{ flex:1; min-width:0; }
  .biz-info .name{ font-size:15px; font-weight:700; }
  .biz-info .meta{ font-size:12px; color:#5F5E5A; margin-top:3px; }
  .biz-info .addr{ font-size:11.5px; color:#8A8880; margin-top:2px; }
  .biz-info .phone{ font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--ink); margin-top:4px; }
  .biz-type-tag{
    font-size:10.5px; font-weight:700; color:var(--jade-dark);
    background:rgba(47,168,160,0.14); padding:2px 8px; border-radius:4px; margin-right:6px;
  }
  .biz-empty{ text-align:center; padding:30px 10px; color:#8A8880; font-size:13px; }
  .tag-row{ display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
  .safety-tag{
    font-size:10.5px; font-weight:700; color:var(--coral-dark);
    background:rgba(226,84,63,0.1); border:1px solid rgba(226,84,63,0.3);
    padding:2px 8px; border-radius:4px;
  }
  .facility-tag{
    font-size:10.5px; color:#5F5E5A;
    background:rgba(28,31,34,0.05); padding:2px 8px; border-radius:4px;
  }

function activeBiz(dong){
  return dong.businesses.filter(b => b.status === '영업중');
}

const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([33.38, 126.55], 10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom:18
}).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

const activeCounts = DONG_DATA.map(d => activeBiz(d).length);
const maxCount = Math.max(...activeCounts, 1);
const totalCount = activeCounts.reduce((s,c) => s + c, 0);
document.getElementById('legend-total').textContent = totalCount;
document.getElementById('legend-dong-count').textContent = DONG_DATA.filter((d,i) => activeCounts[i] > 0).length;

function tierOf(count){
  if (count >= 15) return 'large';
  if (count >= 5) return 'medium';
  return 'small';
}

DONG_DATA.forEach(d => {
  const count = activeBiz(d).length;
  if (count === 0) return;
  const size = Math.round(18 + Math.sqrt(count) * 4.6);
  const opacity = (0.42 + (count / maxCount) * 0.43).toFixed(2);
  const tier = tierOf(count);
  const icon = L.divIcon({
    className:'cluster-icon',
    html:`<div class="cluster-circle tier-${tier}" style="width:${size}px;height:${size}px;opacity:${opacity};font-size:${Math.max(11, size*0.34)}px;">${count}<div class="cluster-label">${d.name}</div></div>`,
    iconSize:[size, size],
    iconAnchor:[size/2, size/2]
  });
  const marker = L.marker([d.lat, d.lng], { icon }).addTo(map);
  marker.on('click', () => openSheet(d));
});

const sheet = document.getElementById('sheet');
const backdrop = document.getElementById('backdrop');

function statusChip(status){
  if (status === '영업중') return `<span class="status-chip active">영업중</span>`;
  if (status === '폐업') return `<span class="status-chip closed">폐업</span>`;
  return `<span class="status-chip unknown">${status || '확인필요'}</span>`;
}

function tagRow(str, cls){
  if (!str) return '';
  return `<div class="tag-row">${str.split('+').map(t=>`<span class="${cls}">${t}</span>`).join('')}</div>`;
}

function openSheet(dong){
  const list = document.getElementById('sheet-list');
  const shown = activeBiz(dong);

  document.getElementById('sheet-title').textContent = dong.name;
  document.getElementById('sheet-sub').textContent = `공공데이터 기준 영업중 ${shown.length}개 · 출처: 공공데이터포털(2022-09-30) · 전화 확인 후 상태가 갱신됩니다`;

  list.innerHTML = shown.length ? shown.map(b => `
    <div class="biz-item">
      ${statusChip(b.status)}
      <div class="biz-info">
        <div class="name">${b.name}</div>
        <div class="meta"><span class="biz-type-tag">${b.type}</span>${b.env ? ` · ${b.env}` : ''}</div>
        <div class="addr">${b.addr}</div>
        <div class="phone">${b.phone || '전화번호 미등록'}</div>
        ${b.safety ? tagRow(b.safety, 'safety-tag') : '<div class="no-safety">⚠ 안전시설 정보 없음 - 확인 필요</div>'}
        ${tagRow(b.facility, 'facility-tag')}
      </div>
    </div>`).join('') : `<div class="biz-empty">확인된 영업중 업체가 없습니다.</div>`;

  sheet.classList.add('open');
  backdrop.classList.add('show');
}

function closeSheet(){
  sheet.classList.remove('open');
  backdrop.classList.remove('show');
}

document.getElementById('sheet-close').addEventListener('click', closeSheet);
backdrop.addEventListener('click', closeSheet);

let dragStartY = null;
const handle = document.getElementById('sheet-handle');
handle.addEventListener('pointerdown', e => { dragStartY = e.clientY; sheet.style.transition = 'none'; });
window.addEventListener('pointermove', e => {
  if (dragStartY === null) return;
  const dy = Math.max(0, e.clientY - dragStartY);
  sheet.style.transform = `translateY(${dy}px)`;
});
window.addEventListener('pointerup', e => {
  if (dragStartY === null) return;
  const dy = e.clientY - dragStartY;
  sheet.style.transition = '';
  sheet.style.transform = '';
  if (dy > 90) closeSheet();
  dragStartY = null;
});

</script>
</body>
</html>
